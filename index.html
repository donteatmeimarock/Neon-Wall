<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Wall - Strategy Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Neon Wall</h1>
            <p>Race to the other side. Block your opponent.</p>
        </header>

        <div class="game-container" id="main-game">
            <!-- Player 2 (Top) Info -->
            <div class="player-panel" id="player2-panel">
                <div class="player-info">
                    <div class="avatar p2-avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="details">
                        <h2>Player 2</h2>
                        <span class="status-indicator">Waiting...</span>
                    </div>
                </div>
                <div class="wall-inventory" id="p2-walls">
                    <!-- Wall icons generated by JS -->
                </div>
            </div>

            <!-- Game Board -->
            <div class="board-wrapper">
                <!-- Start Menu Overlay -->
                <div id="start-overlay" class="overlay-panel">
                    <h2>Select Game Mode</h2>
                    <div class="mode-options">
                        <button id="btn-pvp" class="btn primary-btn"><i class="fa-solid fa-user-group"></i> Player vs Player</button>
                        <button id="btn-pve" class="btn outline-btn"><i class="fa-solid fa-robot"></i> Player vs Bot</button>
                    </div>
                </div>

                <div id="game-board" class="board">
                    <!-- 17x17 Grid generated by JS -->
                </div>
                
                <!-- Win Screen Overlay -->
                <div id="win-overlay" class="overlay-panel hidden">
                    <h2 id="win-message">Player 1 Wins!</h2>
                    <button id="restart-btn" class="btn primary-btn">Play Again</button>
                </div>
            </div>

            <!-- Player 1 (Bottom) Info -->
            <div class="player-panel active" id="player1-panel">
                <div class="player-info">
                    <div class="avatar p1-avatar"><i class="fa-solid fa-user"></i></div>
                    <div class="details">
                        <h2>Player 1</h2>
                        <span class="status-indicator">Your Turn</span>
                    </div>
                </div>
                <div class="wall-inventory" id="p1-walls">
                    <!-- Wall icons generated by JS -->
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="toggle-mode">
                <button id="mode-move" class="mode-btn active"><i class="fa-solid fa-shoe-prints"></i> Move Pawn</button>
                <button id="mode-wall" class="mode-btn"><i class="fa-solid fa-bars-staggered"></i> Place Wall</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
